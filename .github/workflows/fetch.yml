name: Fetch Latest World State

on:
  schedule:
    # Run every hour at minute 21 to avoid top-of-the-hour Actions runner queue congestion
    - cron: '21,51 * * * *'
  repository_dispatch:
    types: [trigger-fetch]
  workflow_dispatch: # Allows manual runs from the GitHub Actions tab

concurrency:
  group: fetch-news
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-and-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # caching pip dependencies for faster runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Fetch and Deduplicate News
        run: python fetch_news.py

      - name: Commit and Push if data.json changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if data.json is modified (M) or untracked (??)
          if git status --porcelain | grep -q "data.json"; then
            echo "Changes detected in data.json, committing..."
            git add data.json
            git commit -m "chore: update world news cache (data.json) [skip ci]"
            git pull --rebase -X theirs origin main
            
            # Verify our data wasn't silently replaced by remote due to -X theirs.
            # If data.json is older than 5 minutes, compile it again and amend the commit.
            if ! python -c "
import json, datetime
d = json.load(open('data.json'))
t = datetime.datetime.fromisoformat(d['last_updated'])
now = datetime.datetime.now(datetime.timezone.utc)
if (now - t).total_seconds() > 300:
    print('data.json was replaced during rebase. Regenerating...')
    exit(1)
"; then
              python fetch_news.py
              git add data.json
              git commit --amend --no-edit || git commit -m "chore: update world news cache (data.json) [skip ci]"
            fi
            
            git push origin main
          else
            echo "No changes detected in data.json. Skipping commit."
          fi
